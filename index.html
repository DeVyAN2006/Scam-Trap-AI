<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ScamTrap AI</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display";
  background: radial-gradient(circle at top, #1e293b, #020617);
  color: white;
  height: 100vh;
  overflow: hidden;
}

.app {
  display: flex;
  height: 100%;
}

/* GLASS */
.glass {
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  border-radius: 16px;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  padding: 14px 20px;
  margin-bottom: 10px;
}

.logo-section {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo {
  height: 60px;
  filter: drop-shadow(0 0 8px rgba(59,130,246,0.4));
}

.brand-name {
  font-size: 16px;
  font-weight: 600;
  background: linear-gradient(90deg, #3b82f6, #22c55e);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.brand-tagline {
  font-size: 11px;
  opacity: 0.6;
}

/* CHAT */
.chat-container {
  flex: 2;
  display: flex;
  flex-direction: column;
  margin: 20px;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.msg {
  margin: 12px 0;
  padding: 14px 18px;
  border-radius: 16px;
  max-width: 65%;
  animation: fadeIn 0.3s ease;
}

.user {
  background: linear-gradient(135deg, #3b82f6, #6366f1);
  margin-left: auto;
}

.bot {
  background: rgba(255,255,255,0.08);
}

.meta {
  font-size: 12px;
  opacity: 0.6;
  margin-top: 6px;
}

/* INPUT */
.input-bar {
  display: flex;
  padding: 10px;
}

input {
  flex: 1;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: rgba(255,255,255,0.08);
  color: white;
}

button {
  margin-left: 10px;
  padding: 14px 20px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #3b82f6, #6366f1);
  color: white;
  cursor: pointer;
}

/* DASHBOARD */
.dashboard {
  flex: 1;
  margin: 20px 20px 20px 0;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.card {
  padding: 15px;
  border-radius: 14px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
}

.card h3 {
  margin: 0 0 10px 0;
  font-size: 13px;
  opacity: 0.7;
}

.item {
  font-size: 13px;
}

/* ANIMATION */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="app">

  <!-- CHAT -->
  <div class="chat-container glass">

    <div class="header">
      <div class="logo-section">
        <img src="logo.png" class="logo" />
        <div>
          <div class="brand-name">ScamTrap AI</div>
          <div class="brand-tagline">AI-powered Scam Intelligence</div>
        </div>
      </div>

      <div style="margin-left:auto;">
        <button onclick="resetConversation()">New Chat</button>
      </div>
    </div>

    <div id="chat"></div>

    <div class="input-bar">
      <input id="input" placeholder="Type scam message..." />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard glass">
    <div class="card">
      <h3>🧠 State</h3>
      <div id="state">-</div>
    </div>

    <div class="card">
      <h3>📊 Confidence</h3>
      <div id="confidence">-</div>
    </div>

    <div class="card">
      <h3>💳 UPI IDs</h3>
      <div id="upi">-</div>
    </div>

    <div class="card">
      <h3>🏦 Bank Accounts</h3>
      <div id="bank">-</div>
    </div>

    <div class="card">
      <h3>🔗 Links</h3>
      <div id="links">-</div>
    </div>
  </div>

</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

const stateEl = document.getElementById("state");
const confidenceEl = document.getElementById("confidence");
const upiEl = document.getElementById("upi");
const bankEl = document.getElementById("bank");
const linksEl = document.getElementById("links");

let typingDiv;

function generateNewId() {
  return "conv-" + Date.now();
}

let conversationId = generateNewId();

function resetConversation() {
  if (!confirm("Start new conversation?")) return;

  conversationId = generateNewId();
  chat.innerHTML = "";

  stateEl.innerText = "-";
  confidenceEl.innerText = "-";
  upiEl.innerHTML = "-";
  bankEl.innerHTML = "-";
  linksEl.innerHTML = "-";

  addMessage("New conversation started.", "bot");
}

function addMessage(text, type, meta="") {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerHTML = `${text}${meta ? `<div class="meta">${meta}</div>` : ""}`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  typingDiv = document.createElement("div");
  typingDiv.className = "msg bot";
  typingDiv.innerText = "Typing...";
  chat.appendChild(typingDiv);
}

function removeTyping() {
  if (typingDiv) typingDiv.remove();
}

async function updateDashboard(conversationId, data) {
  stateEl.innerText = data.persona_state;
  confidenceEl.innerText = data.confidence;

  try {
    const res = await fetch(`http://127.0.0.1:8000/api/data/${conversationId}`);
    const result = await res.json();

    const stored = result.collected_data || {};

    const upi = stored.upi_ids || [];
    const bank = stored.bank_accounts || [];
    const links = stored.phishing_links || [];

    upiEl.innerHTML = upi.length 
      ? upi.map(x => `<div class="item">${x}</div>`).join("")
      : "-";

    bankEl.innerHTML = bank.length 
      ? bank.map(x => `<div class="item">${x}</div>`).join("")
      : "-";

    linksEl.innerHTML = links.length 
      ? links.map(x => `<div class="item">${x}</div>`).join("")
      : "-";

  } catch (err) {
    console.log("Dashboard fetch failed", err);
  }
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  showTyping();

  try {
    const res = await fetch("http://127.0.0.1:8000/api/full", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        conversation_id: conversationId,
        message: text
      })
    });

    const data = await res.json();

    removeTyping();

    addMessage(
      data.reply,
      "bot",
      `state: ${data.persona_state} | confidence: ${data.confidence}`
    );

    // ✅ FIX: delay to avoid race condition
    setTimeout(() => {
      updateDashboard(conversationId, data);
    }, 150);

  } catch {
    removeTyping();
    addMessage("Error connecting to API", "bot");
  }
}
</script>

</body>
</html>
